<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Bucket Saver</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="popup-body">

  <header class="popup-header">
    <h1 class="popup-header-title">🪣 LinkedIn Bucket Saver</h1>
    <div class="global-actions">
      <button id="export-btn" class="action-btn">📥 CSV</button>
      <button id="clear-btn" class="action-btn danger">🗑️ Clear</button>

  </header>

  <nav class="tabs" id="tabs-container">
    <!-- Tabs generated by popup.js -->
  </nav>

  <main class="cards-container" id="cards-container">
    <!-- Cards generated by popup.js -->
  </main>

  <script src="popup.js"></script>
</body>
</html>
